<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SocialShop — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
/* ===== CHAT PAGE STYLES ===== */
.chat-root { display:flex; flex-direction:column; height:100dvh; overflow:hidden; }

/* Conversations list */
.conv-list { flex:1; overflow-y:auto; }
.conv-search { padding:12px 16px; }
.conv-search input {
  width:100%; padding:11px 16px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:999px; color:var(--text); font-size:14px; outline:none;
  transition:border-color .2s;
}
.conv-search input:focus { border-color:var(--primary); }

.conv-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; cursor:pointer;
  transition:background .15s;
}
.conv-item:active { background:var(--surface); }
.conv-avatar { position:relative; flex-shrink:0; }
.conv-avatar img, .conv-avatar-placeholder {
  width:50px; height:50px; border-radius:50%;
  object-fit:cover;
}
.conv-avatar-placeholder {
  background:var(--grad); display:flex; align-items:center;
  justify-content:center; font-size:20px;
}
.online-dot {
  position:absolute; bottom:2px; right:2px;
  width:12px; height:12px; border-radius:50%;
  background:#2EE6A6; border:2px solid var(--bg);
}
.conv-info { flex:1; min-width:0; }
.conv-name { font-size:14px; font-weight:600; }
.conv-preview {
  font-size:12px; color:var(--text-dim);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:2px;
}
.conv-meta { text-align:right; flex-shrink:0; }
.conv-time { font-size:11px; color:var(--text-faint); }
.conv-unread {
  display:inline-flex; align-items:center; justify-content:center;
  width:18px; height:18px; border-radius:50%;
  background:var(--primary); color:#fff;
  font-size:10px; font-weight:700; margin-top:4px;
}

/* ===== MESSAGE VIEW ===== */
.msg-view {
  position:fixed; inset:0; z-index:100;
  background:var(--bg); display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.msg-view.open { transform:translateX(0); }

.msg-header {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px 10px;
  background:linear-gradient(to bottom, var(--bg) 70%, transparent);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--border);
}
.msg-back {
  width:36px; height:36px; border-radius:50%;
  background:var(--surface); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.msg-user-info { flex:1; }
.msg-user-name { font-size:15px; font-weight:700; }
.msg-user-status { font-size:12px; color:var(--success); margin-top:1px; }
.msg-actions { display:flex; gap:8px; }
.msg-action-btn {
  width:34px; height:34px; border-radius:50%;
  background:var(--surface); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:16px;
}

.msg-body { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:6px; }

.msg-bubble-wrap { display:flex; gap:8px; align-items:flex-end; }
.msg-bubble-wrap.me { flex-direction:row-reverse; }
.msg-bubble-wrap.me .msg-avatar { display:none; }

.msg-avatar { width:28px; height:28px; border-radius:50%; background:var(--grad); flex-shrink:0; }

.msg-bubble {
  max-width:72%; padding:10px 14px;
  border-radius:18px; font-size:14px; line-height:1.5;
  word-break:break-word;
}
.msg-bubble-wrap:not(.me) .msg-bubble {
  background:var(--surface-strong); border-bottom-left-radius:4px;
}
.msg-bubble-wrap.me .msg-bubble {
  background:var(--primary); color:#fff; border-bottom-right-radius:4px;
}
.msg-time { font-size:10px; color:var(--text-faint); margin-top:2px; text-align:right; }

.msg-date-divider {
  text-align:center; font-size:11px; color:var(--text-faint);
  padding:8px 0; position:relative;
}
.msg-date-divider::before, .msg-date-divider::after {
  content:''; position:absolute; top:50%; width:35%; height:1px;
  background:var(--border);
}
.msg-date-divider::before { left:0; }
.msg-date-divider::after { right:0; }

.msg-typing {
  display:flex; gap:4px; align-items:center;
  padding:10px 14px; background:var(--surface-strong);
  border-radius:18px; border-bottom-left-radius:4px;
  width:fit-content;
}
.typing-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--text-dim); animation:typing 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay:.2s; }
.typing-dot:nth-child(3) { animation-delay:.4s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

.msg-footer {
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:var(--bg); border-top:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
}
.msg-input-wrap {
  flex:1; display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:999px; padding:8px 14px; transition:border-color .2s;
}
.msg-input-wrap:focus-within { border-color:var(--primary); }
.msg-input {
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-size:14px; resize:none;
  max-height:100px; line-height:1.4;
}
.msg-input::placeholder { color:var(--text-faint); }
.msg-attach-btn { font-size:18px; opacity:.6; }
.msg-send-btn {
  width:40px; height:40px; border-radius:50%;
  background:var(--grad); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0; transition:transform .15s, opacity .15s;
}
.msg-send-btn:disabled { opacity:.4; }
.msg-send-btn:not(:disabled):active { transform:scale(0.9); }

/* Image message */
.msg-img { max-width:180px; border-radius:12px; margin-top:4px; }

/* Reaction bar */
.msg-react { font-size:11px; margin-top:2px; }

/* New conversation fab */
.chat-fab {
  position:fixed; bottom:80px; right:20px;
  width:52px; height:52px; border-radius:50%;
  background:var(--grad); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; box-shadow:0 4px 20px rgba(124,92,252,.5);
  transition:transform .15s;
}
.chat-fab:active { transform:scale(0.9); }

/* Empty state */
.chat-empty {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:60px 24px; gap:12px; text-align:center;
}
.chat-empty-icon { font-size:56px; }
.chat-empty-title { font-size:18px; font-weight:700; }
.chat-empty-sub { font-size:14px; color:var(--text-dim); }

/* User search modal */
.modal-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.7); backdrop-filter:blur(8px);
  display:flex; align-items:flex-end;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal-sheet {
  width:100%; max-height:70dvh; overflow-y:auto;
  background:var(--bg-soft); border-radius:24px 24px 0 0;
  padding-bottom:env(safe-area-inset-bottom);
  transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.show .modal-sheet { transform:translateY(0); }
.modal-handle {
  width:40px; height:4px; border-radius:2px;
  background:var(--border); margin:12px auto;
}
.modal-title { font-size:16px; font-weight:700; padding:0 16px 12px; }
.modal-search { padding:0 16px 12px; }
.modal-search input {
  width:100%; padding:10px 16px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:999px; color:var(--text); font-size:14px; outline:none;
}
.modal-user-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; cursor:pointer; transition:background .15s;
}
.modal-user-item:active { background:var(--surface); }
.modal-avatar {
  width:44px; height:44px; border-radius:50%;
  background:var(--grad); display:flex; align-items:center;
  justify-content:center; font-size:18px; flex-shrink:0;
}
.modal-user-name { font-size:14px; font-weight:600; }
.modal-user-sub { font-size:12px; color:var(--text-dim); }
</style>
</head>
<body>
<div class="app chat-root">

  <!-- Header -->
  <header class="topbar">
    <a class="icon-btn" href="../index.html" style="text-decoration:none">←</a>
    <span class="logo">Tin nhắn</span>
    <button class="icon-btn" onclick="openNewChat()">✏️</button>
  </header>

  <!-- Search -->
  <div class="conv-search">
    <input type="text" id="convSearch" placeholder="Tìm kiếm cuộc trò chuyện..." oninput="filterConvs(this.value)">
  </div>

  <!-- Online friends strip -->
  <div class="story-bar" id="onlineStrip" style="padding:0 16px 14px;gap:12px;"></div>

  <!-- Conversations list -->
  <div class="conv-list" id="convList">
    <!-- skeleton -->
    <div id="convSkeleton">
      <div style="display:flex;gap:12px;padding:12px 16px;align-items:center">
        <div class="skeleton" style="width:50px;height:50px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1"><div class="skeleton" style="height:14px;width:60%;margin-bottom:6px"></div><div class="skeleton" style="height:12px;width:80%"></div></div>
      </div>
      <div style="display:flex;gap:12px;padding:12px 16px;align-items:center">
        <div class="skeleton" style="width:50px;height:50px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1"><div class="skeleton" style="height:14px;width:55%;margin-bottom:6px"></div><div class="skeleton" style="height:12px;width:70%"></div></div>
      </div>
    </div>
    <div id="convItems"></div>
    <div id="convEmpty" class="chat-empty" style="display:none">
      <div class="chat-empty-icon">💬</div>
      <div class="chat-empty-title">Chưa có tin nhắn nào</div>
      <div class="chat-empty-sub">Bắt đầu cuộc trò chuyện với bạn bè</div>
    </div>
  </div>

  <!-- FAB new chat -->
  <button class="chat-fab" onclick="openNewChat()">✏️</button>

  <!-- ===== MESSAGE VIEW (slide in) ===== -->
  <div class="msg-view" id="msgView">
    <div class="msg-header">
      <button class="msg-back" onclick="closeMsg()">←</button>
      <div class="msg-avatar" id="msgAvatar" style="width:36px;height:36px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:16px"></div>
      <div class="msg-user-info">
        <div class="msg-user-name" id="msgUserName">...</div>
        <div class="msg-user-status" id="msgUserStatus">đang online</div>
      </div>
      <div class="msg-actions">
        <button class="msg-action-btn" title="Gọi điện">📞</button>
        <button class="msg-action-btn" title="Video call">📹</button>
      </div>
    </div>
    <div class="msg-body" id="msgBody"></div>
    <div class="msg-footer">
      <div class="msg-input-wrap">
        <span class="msg-attach-btn">📎</span>
        <textarea class="msg-input" id="msgInput" placeholder="Aa..." rows="1"
          oninput="autoResize(this)" onkeydown="handleMsgKey(event)"></textarea>
        <span style="font-size:18px;opacity:.6;cursor:pointer" onclick="insertEmoji()">😊</span>
      </div>
      <button class="msg-send-btn" id="msgSendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>

  <!-- New chat modal -->
  <div class="modal-overlay" id="newChatModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Tin nhắn mới</div>
      <div class="modal-search">
        <input type="text" id="userSearchInput" placeholder="Tìm người dùng..." oninput="searchUsers(this.value)">
      </div>
      <div id="userSearchResults"></div>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a class="nav-item" href="../index.html"><span class="nav-icon">🏠</span><span class="nav-label">Feed</span></a>
  <a class="nav-item" href="marketplace.html"><span class="nav-icon">🛍️</span><span class="nav-label">Shop</span></a>
  <a class="nav-item nav-item--active" href="chat.html"><span class="nav-icon">💬</span><span class="nav-label">Chat</span></a>
  <a class="nav-item" href="notifications.html"><span class="nav-icon">🔔</span><span class="nav-label">Thông báo</span></a>
  <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span><span class="nav-label">Tôi</span></a>
</nav>

<script src="../js/config.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const API = window.API_BASE || 'http://localhost:5000/api';
const token = localStorage.getItem('token');
const me = JSON.parse(localStorage.getItem('user') || 'null');
let socket = null;
let activeConvId = null;
let convData = [];
let onlineUsers = [];

if (!token || !me) {
  window.location.href = 'login.html';
}

// ---- Init ----
document.addEventListener('DOMContentLoaded', async () => {
  await loadConversations();
  initSocket();
  // Enable send btn on input
  document.getElementById('msgInput').addEventListener('input', () => {
    const v = document.getElementById('msgInput').value.trim();
    document.getElementById('msgSendBtn').disabled = !v;
  });
});

// ---- Socket.io ----
function initSocket() {
  socket = io(API.replace('/api',''), { auth: { token } });
  socket.on('connect', () => console.log('Socket connected'));
  socket.on('online_users', (users) => {
    onlineUsers = users;
    renderOnlineStrip();
    updateConvStatuses();
  });
  socket.on('new_message', (msg) => {
    if (String(msg.conversation) === activeConvId) {
      appendMessage(msg);
      scrollBottom();
    }
    // update preview in list
    updateConvPreview(msg);
  });
  socket.on('conversation_started', ({ conversationId }) => {
    loadConversations();
  });
}

// ---- Conversations ----
async function loadConversations() {
  try {
    const res = await fetch(`${API}/messages/conversations`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    convData = data.conversations || [];
    renderConvList(convData);
  } catch {
    // show demo data if API not ready
    convData = getDemoConvs();
    renderConvList(convData);
  } finally {
    document.getElementById('convSkeleton').style.display = 'none';
  }
}

function getDemoConvs() {
  return [
    { _id:'c1', otherUser:{ _id:'u1', username:'Minh Anh', avatar:null }, lastMsg:'Bạn có xem sản phẩm mình đăng chưa?', lastMsgAt: new Date(Date.now()-120000), unread:2 },
    { _id:'c2', otherUser:{ _id:'u2', username:'Hoàng Nam', avatar:null }, lastMsg:'Ok bạn ơi, mình sẽ check lại 👍', lastMsgAt: new Date(Date.now()-3600000), unread:0 },
    { _id:'c3', otherUser:{ _id:'u3', username:'Thu Hà', avatar:null }, lastMsg:'Sản phẩm ship chưa bạn ơi?', lastMsgAt: new Date(Date.now()-86400000), unread:1 },
  ];
}

function renderConvList(convs) {
  const el = document.getElementById('convItems');
  const empty = document.getElementById('convEmpty');
  if (!convs.length) { el.innerHTML=''; empty.style.display='flex'; return; }
  empty.style.display = 'none';
  el.innerHTML = convs.map(c => {
    const u = c.otherUser;
    const isOnline = onlineUsers.includes(String(u._id));
    const timeStr = formatTime(c.lastMsgAt || c.lastMessageAt);
    return `
    <div class="conv-item" onclick="openConversation('${c._id}','${u._id}','${u.username}')">
      <div class="conv-avatar">
        ${u.avatar
          ? `<img src="${u.avatar}" alt="${u.username}">`
          : `<div class="conv-avatar-placeholder">${u.username?.[0]?.toUpperCase()||'?'}</div>`
        }
        ${isOnline ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="conv-info">
        <div class="conv-name">${u.username}</div>
        <div class="conv-preview">${c.lastMsg || 'Bắt đầu trò chuyện...'}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${timeStr}</div>
        ${c.unread ? `<div class="conv-unread">${c.unread}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderOnlineStrip() {
  const el = document.getElementById('onlineStrip');
  if (!onlineUsers.length) { el.innerHTML=''; return; }
  el.innerHTML = `<span style="font-size:12px;color:var(--text-faint);white-space:nowrap;align-self:center">Online</span>` +
    onlineUsers.slice(0,10).map(uid => {
      const conv = convData.find(c => String(c.otherUser._id) === uid);
      if (!conv) return '';
      const u = conv.otherUser;
      return `
      <div style="flex-shrink:0;text-align:center;cursor:pointer" onclick="openConversation('${conv._id}','${u._id}','${u.username}')">
        <div style="position:relative;width:44px;height:44px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto">
          ${u.username?.[0]?.toUpperCase()||'?'}
          <div style="position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:#2EE6A6;border:2px solid var(--bg)"></div>
        </div>
        <div style="font-size:10px;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:44px">${u.username.split(' ')[0]}</div>
      </div>`;
    }).join('');
}

function filterConvs(q) {
  const filtered = convData.filter(c => c.otherUser.username.toLowerCase().includes(q.toLowerCase()));
  renderConvList(filtered);
}

function updateConvStatuses() { renderConvList(convData); }

function updateConvPreview(msg) {
  const c = convData.find(c => c._id === String(msg.conversation));
  if (c) {
    c.lastMsg = msg.text || '📷 Ảnh';
    c.lastMsgAt = msg.createdAt;
    if (String(msg.conversation) !== activeConvId) c.unread = (c.unread||0)+1;
    renderConvList(convData);
  }
}

// ---- Open conversation ----
async function openConversation(convId, userId, userName) {
  activeConvId = convId;
  document.getElementById('msgUserName').textContent = userName;
  document.getElementById('msgAvatar').textContent = userName?.[0]?.toUpperCase()||'?';
  const isOnline = onlineUsers.includes(String(userId));
  document.getElementById('msgUserStatus').textContent = isOnline ? '🟢 Đang online' : 'Offline';
  document.getElementById('msgView').classList.add('open');
  document.getElementById('msgBody').innerHTML = '<div class="msg-date-divider">Hôm nay</div>';
  // Clear unread
  const c = convData.find(c => c._id === convId);
  if (c) c.unread = 0;
  // Join room
  if (socket) socket.emit('join_conversation', convId);
  // Load history
  await loadMessages(convId);
  scrollBottom(false);
}

function closeMsg() {
  document.getElementById('msgView').classList.remove('open');
  activeConvId = null;
  document.getElementById('msgInput').value = '';
  document.getElementById('msgSendBtn').disabled = true;
}

// ---- Load message history ----
async function loadMessages(convId) {
  try {
    const res = await fetch(`${API}/messages/${convId}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const messages = data.messages || [];
    const body = document.getElementById('msgBody');
    body.innerHTML = '';
    if (!messages.length) {
      body.innerHTML = '<div class="msg-date-divider">Bắt đầu cuộc trò chuyện</div>';
      return;
    }
    messages.forEach(m => appendMessage(m, false));
  } catch {
    // demo messages
    const body = document.getElementById('msgBody');
    body.innerHTML = '<div class="msg-date-divider">Hôm nay</div>';
    const demo = [
      { sender:{ _id:'other', username:'Bạn bè' }, text:'Chào bạn! Sản phẩm còn hàng không?', createdAt: new Date(Date.now()-3600000) },
      { sender:{ _id: me?._id||'me' }, text:'Còn bạn ơi! Bạn muốn mua cái nào?', createdAt: new Date(Date.now()-3540000) },
      { sender:{ _id:'other' }, text:'Mình quan tâm cái áo xanh trên shop 🥰', createdAt: new Date(Date.now()-3480000) },
      { sender:{ _id: me?._id||'me' }, text:'Ok mình để ý bạn lại nhé, mình đang check tồn kho 👍', createdAt: new Date(Date.now()-3420000) },
    ];
    demo.forEach(m => appendMessage(m, false));
  }
}

function appendMessage(msg, animate = true) {
  const body = document.getElementById('msgBody');
  const isMe = String(msg.sender?._id || msg.sender) === String(me?._id);
  const wrap = document.createElement('div');
  wrap.className = `msg-bubble-wrap${isMe?' me':''}`;
  if (animate) wrap.style.animation = 'fadeSlideUp .2s ease';
  wrap.innerHTML = `
    ${!isMe ? `<div class="msg-avatar">${(msg.sender?.username||'?')[0].toUpperCase()}</div>` : ''}
    <div>
      ${msg.image ? `<img class="msg-img" src="${msg.image}" alt="image">` : ''}
      ${msg.text ? `<div class="msg-bubble">${escHtml(msg.text)}</div>` : ''}
      <div class="msg-time">${formatTime(msg.createdAt)}</div>
    </div>`;
  body.appendChild(wrap);
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeConvId || !socket) return;
  // Optimistic render
  appendMessage({ sender: me, text, createdAt: new Date() });
  scrollBottom();
  socket.emit('send_message', { conversationId: activeConvId, text });
  input.value = '';
  input.style.height = '';
  document.getElementById('msgSendBtn').disabled = true;
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function scrollBottom(smooth=true) {
  const body = document.getElementById('msgBody');
  body.scrollTo({ top: body.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
}

// ---- New chat modal ----
function openNewChat() {
  document.getElementById('newChatModal').classList.add('show');
  setTimeout(() => document.getElementById('userSearchInput').focus(), 300);
}
function closeModal() {
  document.getElementById('newChatModal').classList.remove('show');
}

let searchTimer;
function searchUsers(q) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    if (!q) { document.getElementById('userSearchResults').innerHTML=''; return; }
    try {
      const res = await fetch(`${API}/users/search?q=${encodeURIComponent(q)}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      renderUserResults(data.users || []);
    } catch {
      renderUserResults([
        { _id:'u1', username:'Minh Anh', bio:'Thành viên SocialShop' },
        { _id:'u2', username:'Hoàng Nam', bio:'Người bán hàng' },
      ].filter(u => u.username.toLowerCase().includes(q.toLowerCase())));
    }
  }, 300);
}

function renderUserResults(users) {
  const el = document.getElementById('userSearchResults');
  el.innerHTML = users.map(u => `
    <div class="modal-user-item" onclick="startChatWith('${u._id}','${u.username}')">
      <div class="modal-avatar">${u.username?.[0]?.toUpperCase()||'?'}</div>
      <div>
        <div class="modal-user-name">${u.username}</div>
        <div class="modal-user-sub">${u.bio||'SocialShop member'}</div>
      </div>
    </div>
  `).join('');
}

function startChatWith(userId, userName) {
  closeModal();
  if (!socket) return;
  socket.emit('start_conversation', { targetUserId: userId }, ({ conversationId, error }) => {
    if (error) { showToast(error, 'error'); return; }
    openConversation(conversationId, userId, userName);
  });
}

function insertEmoji() { /* placeholder */ }

// ---- Utils ----
function formatTime(date) {
  if (!date) return '';
  const d = new Date(date);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'vừa xong';
  if (diff < 3600000) return `${Math.floor(diff/60000)} phút`;
  if (diff < 86400000) return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `${d.getDate()}/${d.getMonth()+1}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 3000);
}
</script>
