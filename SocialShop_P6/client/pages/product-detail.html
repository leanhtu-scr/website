<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SocialShop — Chi tiết sản phẩm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.product-gallery { position:relative; background:var(--surface); overflow:hidden; }
.product-gallery img { width:100%; max-height:340px; object-fit:cover; display:block; }
.gallery-placeholder { width:100%; height:280px; background:linear-gradient(135deg,#7C5CFC33,#FF6B6B33); display:flex; align-items:center; justify-content:center; font-size:64px; }
.gallery-dots { display:flex; justify-content:center; gap:6px; padding:10px; }
.gdot { width:7px; height:7px; border-radius:50%; background:var(--text-faint); }
.gdot.active { background:var(--primary); }

.product-info { padding:16px; }
.product-price { font-family:var(--font-mono); font-size:26px; font-weight:700; color:var(--accent); margin:4px 0; }
.product-title { font-size:18px; font-weight:700; line-height:1.35; }
.product-meta { display:flex; align-items:center; gap:10px; margin:10px 0; font-size:13px; color:var(--text-dim); }
.stars { color:#FFC95C; letter-spacing:-1px; }
.badge-cat { background:var(--surface-strong); padding:3px 10px; border-radius:999px; font-size:11px; }
.sold-badge { font-size:11px; color:var(--text-faint); }

.product-desc { font-size:14px; color:var(--text-dim); line-height:1.65; margin-top:12px; }
.product-desc.collapsed { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.read-more { color:var(--primary); font-size:13px; cursor:pointer; margin-top:4px; display:inline-block; }

.seller-row { display:flex; align-items:center; gap:10px; padding:14px 16px; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin:0 0 4px; }
.seller-avatar { width:40px; height:40px; border-radius:50%; background:var(--grad); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
.seller-name { font-weight:600; font-size:14px; }
.seller-label { font-size:11px; color:var(--text-faint); }
.seller-follow-btn { margin-left:auto; font-size:12px; padding:6px 14px; border-radius:999px; background:var(--surface-strong); color:var(--text); border:1px solid var(--border); cursor:pointer; }

.qty-row { display:flex; align-items:center; gap:16px; padding:14px 16px; }
.qty-label { font-size:13px; color:var(--text-dim); }
.qty-ctrl { display:flex; align-items:center; gap:0; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.qty-btn { width:36px; height:36px; background:var(--surface-strong); border:none; color:var(--text); font-size:18px; cursor:pointer; }
.qty-val { width:40px; text-align:center; font-family:var(--font-mono); font-size:14px; font-weight:600; background:transparent; border:none; color:var(--text); }
.stock-label { font-size:12px; color:var(--text-faint); margin-left:auto; }

.action-bar { display:flex; gap:8px; padding:14px 16px 20px; position:sticky; bottom:0; background:var(--bg); border-top:1px solid var(--border); }
.btn-cart { flex:1; padding:13px; border-radius:12px; background:var(--surface-strong); border:2px solid var(--primary); color:var(--primary); font-weight:700; font-size:14px; cursor:pointer; }
.btn-buy { flex:2; padding:13px; border-radius:12px; background:var(--grad); color:#fff; border:none; font-weight:700; font-size:14px; cursor:pointer; }

/* Reviews section */
.section-title { font-size:15px; font-weight:700; padding:14px 16px 8px; border-top:8px solid var(--surface); }
.review-summary { display:flex; align-items:center; gap:14px; padding:0 16px 14px; }
.big-rating { font-size:40px; font-weight:800; font-family:var(--font-mono); line-height:1; }
.rating-bars { flex:1; display:flex; flex-direction:column; gap:4px; }
.rbar-row { display:flex; align-items:center; gap:6px; font-size:11px; }
.rbar-track { flex:1; height:5px; background:var(--surface-strong); border-radius:999px; overflow:hidden; }
.rbar-fill { height:100%; background:#FFC95C; border-radius:999px; }

.write-review { margin:0 16px 14px; padding:12px; background:var(--surface); border-radius:12px; border:1px solid var(--border); }
.star-picker { display:flex; gap:4px; margin:8px 0; }
.star-pick { font-size:22px; cursor:pointer; opacity:.4; transition:opacity .1s; }
.star-pick.active { opacity:1; }
.review-input { width:100%; background:transparent; border:none; color:var(--text); font-size:14px; resize:none; min-height:60px; font-family:var(--font-body); outline:none; }
.submit-review-btn { background:var(--grad); color:#fff; border:none; border-radius:8px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; margin-top:6px; }

.review-list { padding:0 16px 100px; display:flex; flex-direction:column; gap:14px; }
.review-card { background:var(--surface); border-radius:12px; padding:12px; }
.review-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.review-avatar { width:32px; height:32px; border-radius:50%; background:var(--grad); font-size:14px; display:flex; align-items:center; justify-content:center; }
.review-user { font-size:13px; font-weight:600; }
.review-date { font-size:11px; color:var(--text-faint); margin-left:auto; }
.review-stars { color:#FFC95C; font-size:13px; }
.review-text { font-size:13px; color:var(--text-dim); line-height:1.55; margin-top:4px; }
</style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn" onclick="history.back()">←</button>
    <span class="logo" style="font-size:15px">Chi tiết sản phẩm</span>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </header>

  <!-- Gallery -->
  <div class="product-gallery" id="gallery">
    <div class="gallery-placeholder">🛍️</div>
  </div>

  <!-- Product info -->
  <div class="product-info" id="productInfo">
    <div class="product-title" id="productTitle">Đang tải...</div>
    <div class="product-price" id="productPrice">—</div>
    <div class="product-meta">
      <span class="stars" id="productStars">☆☆☆☆☆</span>
      <span id="productRating">0</span>
      <span class="sold-badge" id="productSold"></span>
      <span class="badge-cat" id="productCat"></span>
    </div>
    <div class="product-desc collapsed" id="productDesc">Đang tải mô tả sản phẩm...</div>
    <span class="read-more" id="readMoreBtn" onclick="toggleDesc()">Xem thêm</span>
  </div>

  <!-- Seller -->
  <div class="seller-row" id="sellerRow">
    <div class="seller-avatar">👤</div>
    <div>
      <div class="seller-name" id="sellerName">—</div>
      <div class="seller-label">Người bán</div>
    </div>
    <button class="seller-follow-btn" id="followSellerBtn" onclick="followSeller()">+ Theo dõi</button>
  </div>

  <!-- Quantity -->
  <div class="qty-row">
    <span class="qty-label">Số lượng</span>
    <div class="qty-ctrl">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <input class="qty-val" id="qtyInput" value="1" readonly>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <span class="stock-label" id="stockLabel">Còn hàng</span>
  </div>

  <!-- Reviews -->
  <div class="section-title">⭐ Đánh giá sản phẩm</div>
  <div class="review-summary">
    <div class="big-rating" id="bigRating">0</div>
    <div class="rating-bars" id="ratingBars">
      <div style="font-size:12px;color:var(--text-faint)">Chưa có đánh giá</div>
    </div>
  </div>

  <div class="write-review" id="writeReviewSection">
    <div style="font-size:13px;font-weight:600">Viết đánh giá</div>
    <div class="star-picker" id="starPicker">
      <span class="star-pick" onclick="pickStar(1)">★</span>
      <span class="star-pick" onclick="pickStar(2)">★</span>
      <span class="star-pick" onclick="pickStar(3)">★</span>
      <span class="star-pick" onclick="pickStar(4)">★</span>
      <span class="star-pick" onclick="pickStar(5)">★</span>
    </div>
    <textarea class="review-input" id="reviewText" placeholder="Chia sẻ trải nghiệm của bạn về sản phẩm này..."></textarea>
    <button class="submit-review-btn" onclick="submitReview()">Gửi đánh giá</button>
  </div>

  <div class="review-list" id="reviewList">
    <div style="color:var(--text-faint);font-size:13px;text-align:center;padding:20px">Chưa có đánh giá nào</div>
  </div>

  <!-- Sticky action bar -->
  <div class="action-bar">
    <button class="btn-cart" onclick="addToCartFromPage()">🛒 Giỏ hàng</button>
    <button class="btn-buy" onclick="buyNow()">Mua ngay</button>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script>
let product = null;
let selectedRating = 0;
let descExpanded = false;

// Lấy productId từ URL param
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');

async function loadProduct() {
  if (!productId) { document.getElementById('productTitle').textContent = 'Không tìm thấy sản phẩm'; return; }
  try {
    const data = await apiRequest(`/products/${productId}`);
    product = data.product;
    renderProduct();
  } catch (err) {
    toast('Không thể tải sản phẩm', 'accent');
  }
}

function formatPrice(n) {
  return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(n);
}

function renderProduct() {
  document.title = `${product.name} — SocialShop`;
  document.getElementById('productTitle').textContent = product.name;
  document.getElementById('productPrice').textContent = formatPrice(product.price);
  document.getElementById('productDesc').textContent = product.description || 'Không có mô tả';
  document.getElementById('productSold').textContent = `Đã bán ${product.sold || 0}`;
  document.getElementById('productCat').textContent = product.category || '';
  document.getElementById('stockLabel').textContent = product.stock > 0 ? `Còn ${product.stock} sản phẩm` : '⚠️ Hết hàng';

  // Rating
  const avg = product.avgRating || 0;
  document.getElementById('bigRating').textContent = avg.toFixed(1);
  document.getElementById('productRating').textContent = avg.toFixed(1);
  const starFull = Math.round(avg);
  document.getElementById('productStars').textContent = '★'.repeat(starFull) + '☆'.repeat(5 - starFull);

  // Gallery
  if (product.images && product.images.length) {
    const g = document.getElementById('gallery');
    g.innerHTML = `<img src="${product.images[0]}" alt="${product.name}" onerror="this.style.display='none'">`;
    if (product.images.length > 1) {
      g.innerHTML += `<div class="gallery-dots">${product.images.map((_, i) => `<div class="gdot ${i===0?'active':''}"></div>`).join('')}</div>`;
    }
  }

  // Seller
  if (product.seller) {
    document.getElementById('sellerName').textContent = product.seller.fullName || product.seller.username;
    document.getElementById('sellerRow').dataset.sellerId = product.seller._id;
  }

  // Rating bars
  if (product.reviews && product.reviews.length) {
    const counts = [0,0,0,0,0];
    product.reviews.forEach(r => { if (r.rating >= 1 && r.rating <= 5) counts[r.rating-1]++; });
    const max = Math.max(...counts, 1);
    document.getElementById('ratingBars').innerHTML = [5,4,3,2,1].map(s =>
      `<div class="rbar-row"><span>${s}★</span><div class="rbar-track"><div class="rbar-fill" style="width:${(counts[s-1]/max*100).toFixed(0)}%"></div></div><span>${counts[s-1]}</span></div>`
    ).join('');
    renderReviews();
  }
}

function renderReviews() {
  if (!product.reviews || !product.reviews.length) return;
  document.getElementById('reviewList').innerHTML = product.reviews.map(r => `
    <div class="review-card">
      <div class="review-header">
        <div class="review-avatar">👤</div>
        <div>
          <div class="review-user">${r.user?.username || 'Ẩn danh'}</div>
          <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
        </div>
        <div class="review-date">${new Date(r.createdAt).toLocaleDateString('vi-VN')}</div>
      </div>
      ${r.comment ? `<div class="review-text">${r.comment}</div>` : ''}
    </div>
  `).join('');
}

function toggleDesc() {
  descExpanded = !descExpanded;
  const el = document.getElementById('productDesc');
  el.classList.toggle('collapsed', !descExpanded);
  document.getElementById('readMoreBtn').textContent = descExpanded ? 'Thu gọn' : 'Xem thêm';
}

function changeQty(delta) {
  const input = document.getElementById('qtyInput');
  const max = product?.stock || 99;
  const newVal = Math.max(1, Math.min(max, parseInt(input.value) + delta));
  input.value = newVal;
}

function addToCartFromPage() {
  if (!product) return;
  const qty = parseInt(document.getElementById('qtyInput').value);
  addToCart(product.name, product.price, qty);
}

function buyNow() {
  if (!product) return;
  const qty = parseInt(document.getElementById('qtyInput').value);
  const cart = [{ productId: product._id, name: product.name, price: product.price, quantity: qty, image: product.images?.[0] || '' }];
  localStorage.setItem('ss_buynow', JSON.stringify(cart));
  window.location.href = 'checkout.html';
}

function pickStar(n) {
  selectedRating = n;
  document.querySelectorAll('.star-pick').forEach((s, i) => s.classList.toggle('active', i < n));
}

async function submitReview() {
  if (!getSession()) { toast('Vui lòng đăng nhập để đánh giá', 'accent'); return; }
  if (!selectedRating) { toast('Hãy chọn số sao', 'accent'); return; }
  try {
    await apiRequest(`/products/${productId}/review`, {
      method: 'POST',
      auth: true,
      body: { rating: selectedRating, comment: document.getElementById('reviewText').value.trim() },
    });
    toast('Cảm ơn đánh giá của bạn!', 'success');
    loadProduct();
  } catch (err) { toast(err.message, 'accent'); }
}

async function followSeller() {
  if (!getSession()) { toast('Vui lòng đăng nhập', 'accent'); return; }
  const sellerId = document.getElementById('sellerRow').dataset.sellerId;
  if (!sellerId) return;
  try {
    const data = await apiRequest(`/users/${sellerId}/follow`, { method: 'POST', auth: true });
    const btn = document.getElementById('followSellerBtn');
    btn.textContent = data.following ? '✓ Đang theo dõi' : '+ Theo dõi';
    toast(data.following ? 'Đã theo dõi người bán' : 'Đã bỏ theo dõi', 'success');
  } catch (err) { toast(err.message, 'accent'); }
}

window.addEventListener('DOMContentLoaded', loadProduct);
</script>
</body>
</html>
