<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SocialShop — Thông báo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
/* ===== NOTIFICATION STYLES ===== */
.notif-tabs {
  display:flex; gap:6px; padding:10px 16px;
  overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--border);
}
.ntab {
  padding:7px 16px; border-radius:999px;
  font-size:13px; font-weight:600; white-space:nowrap;
  cursor:pointer; background:var(--surface); color:var(--text-dim);
  transition:all .2s; border:1px solid var(--border);
}
.ntab.active { background:var(--grad); color:#fff; border-color:transparent; }

.notif-list { padding:8px 0; }

.notif-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:12px 16px; cursor:pointer; transition:background .15s;
  position:relative;
}
.notif-item:active { background:var(--surface); }
.notif-item.unread { background:rgba(124,92,252,0.06); }
.notif-item.unread::before {
  content:''; position:absolute; left:6px; top:50%; transform:translateY(-50%);
  width:6px; height:6px; border-radius:50%; background:var(--primary);
}

.notif-avatar {
  position:relative; flex-shrink:0;
  width:46px; height:46px; border-radius:50%;
  background:var(--grad); display:flex; align-items:center;
  justify-content:center; font-size:20px;
}
.notif-type-badge {
  position:absolute; bottom:-2px; right:-2px;
  width:20px; height:20px; border-radius:50%;
  border:2px solid var(--bg); display:flex; align-items:center;
  justify-content:center; font-size:11px;
}
.badge-like { background:#FF6B6B; }
.badge-comment { background:#7C5CFC; }
.badge-follow { background:#2EE6A6; }
.badge-order { background:#FFC95C; }
.badge-system { background:#9C9AB8; }

.notif-content { flex:1; min-width:0; }
.notif-text { font-size:13px; line-height:1.5; }
.notif-text strong { font-weight:700; color:var(--text); }
.notif-time { font-size:11px; color:var(--text-faint); margin-top:3px; }

.notif-thumb {
  width:44px; height:44px; border-radius:10px;
  object-fit:cover; flex-shrink:0; background:var(--surface);
  display:flex; align-items:center; justify-content:center; font-size:20px;
}

.notif-action-btn {
  padding:6px 14px; border-radius:8px; font-size:12px; font-weight:600;
  cursor:pointer; transition:all .15s;
}
.notif-btn-primary {
  background:var(--primary); color:#fff;
}
.notif-btn-secondary {
  background:var(--surface); color:var(--text); border:1px solid var(--border);
}
.notif-btn-primary:active, .notif-btn-secondary:active { transform:scale(0.95); }

.notif-section-header {
  padding:10px 16px 6px;
  font-size:12px; font-weight:700; color:var(--text-faint);
  text-transform:uppercase; letter-spacing:.06em;
}

.mark-all-btn {
  font-size:12px; color:var(--primary); font-weight:600;
  padding:4px 8px; cursor:pointer;
}

.notif-empty {
  display:flex; flex-direction:column; align-items:center;
  padding:60px 24px; gap:12px; text-align:center;
}
.notif-empty-icon { font-size:56px; }
.notif-empty-title { font-size:18px; font-weight:700; }
.notif-empty-sub { font-size:14px; color:var(--text-dim); }

@keyframes fadeSlideUp {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.notif-item { animation:fadeSlideUp .3s ease both; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="topbar">
    <span class="logo">Thông báo</span>
    <button class="mark-all-btn" onclick="markAllRead()">Đọc tất cả</button>
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
  </header>

  <!-- Tabs -->
  <div class="notif-tabs">
    <div class="ntab active" data-tab="all" onclick="switchTab(this,'all')">Tất cả</div>
    <div class="ntab" data-tab="social" onclick="switchTab(this,'social')">Mạng xã hội</div>
    <div class="ntab" data-tab="shop" onclick="switchTab(this,'shop')">Mua sắm</div>
    <div class="ntab" data-tab="system" onclick="switchTab(this,'system')">Hệ thống</div>
  </div>

  <!-- Content -->
  <div id="notifContent">
    <div id="notifSkeleton">
      ${Array(4).fill(0).map(()=>`
      <div style="display:flex;gap:12px;padding:12px 16px;align-items:flex-start">
        <div class="skeleton" style="width:46px;height:46px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skeleton" style="height:13px;width:85%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:11px;width:40%"></div>
        </div>
      </div>`).join('')}
    </div>
    <div id="notifList" class="notif-list" style="display:none"></div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a class="nav-item" href="../index.html"><span class="nav-icon">🏠</span><span class="nav-label">Feed</span></a>
  <a class="nav-item" href="marketplace.html"><span class="nav-icon">🛍️</span><span class="nav-label">Shop</span></a>
  <a class="nav-item" href="chat.html"><span class="nav-icon">💬</span><span class="nav-label">Chat</span></a>
  <a class="nav-item nav-item--active" href="notifications.html"><span class="nav-icon">🔔</span><span class="nav-label">Thông báo</span></a>
  <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span><span class="nav-label">Tôi</span></a>
</nav>

<script src="../js/config.js"></script>
<script>
const API = window.API_BASE || 'http://localhost:5000/api';
const token = localStorage.getItem('token');
let allNotifs = [];
let currentTab = 'all';

document.addEventListener('DOMContentLoaded', async () => {
  await loadNotifications();
});

async function loadNotifications() {
  try {
    const res = await fetch(`${API}/notifications`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    allNotifs = data.notifications || [];
  } catch {
    allNotifs = getDemoNotifs();
  }
  renderNotifications();
}

function getDemoNotifs() {
  return [
    { _id:'n1', type:'like', actor:{ username:'Minh Anh' }, content:'đã thích bài viết của bạn', postId:'p1', read:false, createdAt: new Date(Date.now()-60000) },
    { _id:'n2', type:'comment', actor:{ username:'Hoàng Nam' }, content:'đã bình luận: "Sản phẩm đẹp quá!"', postId:'p1', read:false, createdAt: new Date(Date.now()-300000) },
    { _id:'n3', type:'follow', actor:{ username:'Thu Hà' }, content:'đã bắt đầu theo dõi bạn', read:false, createdAt: new Date(Date.now()-600000) },
    { _id:'n4', type:'order', actor:{ username:'Hệ thống' }, content:'Đơn hàng #SS2024001 đã được xác nhận', orderId:'o1', read:true, createdAt: new Date(Date.now()-3600000) },
    { _id:'n5', type:'like', actor:{ username:'Quốc Bảo' }, content:'đã thích ảnh của bạn', read:true, createdAt: new Date(Date.now()-7200000) },
    { _id:'n6', type:'comment', actor:{ username:'Lan Anh' }, content:'đã nhắc đến bạn trong bình luận', read:true, createdAt: new Date(Date.now()-86400000) },
    { _id:'n7', type:'order', actor:{ username:'Hệ thống' }, content:'Đơn hàng #SS2024002 đang được vận chuyển 🚚', read:true, createdAt: new Date(Date.now()-172800000) },
    { _id:'n8', type:'system', actor:{ username:'SocialShop' }, content:'Chào mừng bạn đến với SocialShop! Hãy hoàn thiện hồ sơ của bạn.', read:true, createdAt: new Date(Date.now()-259200000) },
    { _id:'n9', type:'follow', actor:{ username:'Phong Trần' }, content:'đã bắt đầu theo dõi bạn', read:true, createdAt: new Date(Date.now()-432000000) },
  ];
}

function renderNotifications() {
  document.getElementById('notifSkeleton').style.display = 'none';
  const list = document.getElementById('notifList');
  list.style.display = 'block';

  const filtered = filterByTab(allNotifs, currentTab);
  if (!filtered.length) {
    list.innerHTML = `
      <div class="notif-empty">
        <div class="notif-empty-icon">🔔</div>
        <div class="notif-empty-title">Không có thông báo</div>
        <div class="notif-empty-sub">Bạn đã đọc hết tất cả thông báo rồi!</div>
      </div>`;
    return;
  }

  // Group: today / this week / older
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekStart = new Date(todayStart - 6*86400000);

  const groups = {
    today: filtered.filter(n => new Date(n.createdAt) >= todayStart),
    week:  filtered.filter(n => new Date(n.createdAt) >= weekStart && new Date(n.createdAt) < todayStart),
    older: filtered.filter(n => new Date(n.createdAt) < weekStart),
  };

  let html = '';
  if (groups.today.length) {
    html += `<div class="notif-section-header">Hôm nay</div>`;
    html += groups.today.map((n,i) => renderNotifItem(n, i*50)).join('');
  }
  if (groups.week.length) {
    html += `<div class="notif-section-header">Tuần này</div>`;
    html += groups.week.map((n,i) => renderNotifItem(n, i*50)).join('');
  }
  if (groups.older.length) {
    html += `<div class="notif-section-header">Trước đó</div>`;
    html += groups.older.map((n,i) => renderNotifItem(n, i*50)).join('');
  }
  list.innerHTML = html;
}

function renderNotifItem(n, delay) {
  const icons = { like:'❤️', comment:'💬', follow:'👤', order:'📦', system:'⚙️' };
  const badgeCls = { like:'badge-like', comment:'badge-comment', follow:'badge-follow', order:'badge-order', system:'badge-system' };
  const initial = (n.actor?.username||'?')[0].toUpperCase();

  let actions = '';
  if (n.type === 'follow') {
    actions = `
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="notif-action-btn notif-btn-primary" onclick="followBack('${n.actor._id||''}',event)">Theo dõi lại</button>
        <button class="notif-action-btn notif-btn-secondary" onclick="event.stopPropagation()">Bỏ qua</button>
      </div>`;
  }

  let thumb = '';
  if (n.type === 'order') {
    thumb = `<div class="notif-thumb">📦</div>`;
  }

  return `
  <div class="notif-item${n.read?'':' unread'}" onclick="handleNotifClick('${n._id}','${n.type}','${n.postId||''}','${n.orderId||''}')"
    style="animation-delay:${delay}ms">
    <div class="notif-avatar">
      ${initial}
      <div class="notif-type-badge ${badgeCls[n.type]||'badge-system'}">${icons[n.type]||'🔔'}</div>
    </div>
    <div class="notif-content">
      <div class="notif-text"><strong>${n.actor?.username||'SocialShop'}</strong> ${n.content}</div>
      <div class="notif-time">${formatTime(n.createdAt)}</div>
      ${actions}
    </div>
    ${thumb}
  </div>`;
}

function filterByTab(notifs, tab) {
  if (tab === 'all') return notifs;
  if (tab === 'social') return notifs.filter(n => ['like','comment','follow'].includes(n.type));
  if (tab === 'shop') return notifs.filter(n => n.type === 'order');
  if (tab === 'system') return notifs.filter(n => n.type === 'system');
  return notifs;
}

function switchTab(el, tab) {
  document.querySelectorAll('.ntab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  renderNotifications();
}

async function handleNotifClick(id, type, postId, orderId) {
  // Mark as read
  const n = allNotifs.find(x => x._id === id);
  if (n) n.read = true;
  try {
    await fetch(`${API}/notifications/${id}/read`, {
      method:'PATCH', headers:{ Authorization:`Bearer ${token}` }
    });
  } catch {}
  // Navigate
  if (type === 'order' && orderId) window.location.href = `order-detail.html?id=${orderId}`;
  else if (postId) window.location.href = `../index.html#post-${postId}`;
  else renderNotifications();
}

async function markAllRead() {
  allNotifs.forEach(n => n.read = true);
  try {
    await fetch(`${API}/notifications/read-all`, {
      method:'PATCH', headers:{ Authorization:`Bearer ${token}` }
    });
  } catch {}
  renderNotifications();
  showToast('Đã đánh dấu tất cả là đã đọc ✓', 'success');
}

async function followBack(userId, e) {
  e.stopPropagation();
  try {
    await fetch(`${API}/users/${userId}/follow`, {
      method:'POST', headers:{ Authorization:`Bearer ${token}` }
    });
    showToast('Đã theo dõi lại!', 'success');
  } catch {
    showToast('Đã theo dõi lại!', 'success');
  }
}

function formatTime(date) {
  if (!date) return '';
  const d = new Date(date);
  const diff = Date.now() - d;
  if (diff < 60000) return 'vừa xong';
  if (diff < 3600000) return `${Math.floor(diff/60000)} phút trước`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} giờ trước`;
  if (diff < 604800000) return `${Math.floor(diff/86400000)} ngày trước`;
  return d.toLocaleDateString('vi-VN');
}

function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 3000);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}
</script>
</body>
</html>
